# PsyQ function metadata: subsystem + stub_type per known SDK function name.
#
# This is the source of truth for the subsystem/stub_type fields that the
# signature generator (tools/extract_psyq_signatures.py) joins into the
# generated psyq_signatures.toml.
#
# Migrated from ps1Analyzer/src/psyq_signatures.cpp::initDatabase() on
# 2026-04-25 (Sessao 0.3). When ps1Analyzer C++ is updated to read this file
# directly, initDatabase() can be deleted.
#
# Fields per [[function]]:
#   name        - exact PsyQ symbol name (case-sensitive)
#   subsystem   - one of: graphics, sound, cdrom, controller, gte, vsync,
#                          memory, libc, math, other
#   stub_type   - one of: stub, skip, passthrough, recompile
#
# Names not present here will be emitted with empty subsystem/stub_type
# (the matcher should fall back to prefix-based classification).


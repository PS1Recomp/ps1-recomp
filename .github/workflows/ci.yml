name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Primary job: build + run full test suite (stub mode -- no ROM required)
  build-and-test:
    name: Build & Test (stub mode)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libsdl2-dev libglfw3-dev libgl-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPS1RECOMP_BUILD_TESTS=ON -DPS1RECOMP_USE_STUB=ON

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Run tests
      run: ctest --test-dir build --output-on-failure --verbose

  # Documentation job: verify Doxygen generates without errors
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libsdl2-dev libglfw3-dev libgl-dev doxygen

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPS1RECOMP_USE_STUB=ON

    - name: Build documentation
      run: cmake --build build --target docs

# Example PS1 Game Configuration for PS1Recomp
# Copy this file and customize for each game

[game]
name = "Example Game"
serial = "SLUS-00000"
elf_path = "PSX.EXE"

# Functions to stub (replace with runtime implementations)
# Typically PsyQ SDK functions at addresses > 0x800A0000
[stubs]
# address = "function_name"
# "0x800B1234" = "GsInitGraph"
# "0x800B5678" = "CdInit"

# Functions to skip entirely (do nothing)
[skips]
# address = "reason"
# "0x800BAAAA" = "debug_print — not needed"

# Address patches (override specific instructions)
[patches]
# address = "replacement_instruction"

# Overlay sections (dynamically loaded code)
[[overlays]]
# name = "overlay_1"
# load_address = "0x80060000"
# file = "OVL1.BIN"
# size = "0x4000"
